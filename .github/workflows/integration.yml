name: Integration

# Real-world smoke: build ts-anti-patterns, point it at pinned commits of a handful of
# popular TS/JS repos, assert every output format renders and the JSON
# envelope conforms to schemas/report-v1.json.
#
# Runs:
#   - Nightly at 04:00 UTC.
#   - Manually via the "Run workflow" button.
#   - On every PR that touches src/, schemas/, scripts/smoke-real.sh, or this
#     workflow itself (cheap insurance for changes that risk crashing on
#     real-world code).
on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:
  pull_request:
    paths:
      - "src/**"
      - "schemas/**"
      - "scripts/smoke-real.sh"
      - ".github/workflows/integration.yml"

permissions:
  contents: read

jobs:
  smoke:
    name: Smoke against ${{ matrix.target.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      # Pin to specific commits, not branches: nightlies should fail because
      # ts-anti-patterns broke, not because a downstream project shipped a new commit.
      matrix:
        target:
          - name: p-limit
            url: https://github.com/sindresorhus/p-limit
            ref: 42599eb1d2bbe19944b4dffcb83fd28a4d5d4054
          - name: ky
            url: https://github.com/sindresorhus/ky
            ref: main # tiny lib, low risk
          - name: zod
            url: https://github.com/colinhacks/zod
            ref: main # the stress test - large surface

    steps:
      - name: Check out ts-anti-patterns
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install + build ts-anti-patterns
        run: |
          npm ci
          npm run build

      - name: Smoke against ${{ matrix.target.name }}
        # The script downloads, installs, runs every format, validates JSON
        # against report-v1.json. ARTIFACT_DIR pins where artifacts land so
        # the upload step below can pick them up on failure.
        env:
          ARTIFACT_DIR: ${{ runner.temp }}/smoke-${{ matrix.target.name }}
        run: bash scripts/smoke-real.sh "${{ matrix.target.url }}" "${{ matrix.target.ref }}"

      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-${{ matrix.target.name }}-failure
          path: ${{ runner.temp }}/smoke-${{ matrix.target.name }}/**
          if-no-files-found: ignore
          retention-days: 7
