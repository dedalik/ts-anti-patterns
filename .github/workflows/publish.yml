name: Publish to npm

# Publishes when you push a version tag (e.g. v1.0.0). Tag must match package.json.
# First release: publish once locally (`npm login` + `npm publish`), then configure Trusted
# Publisher on npm for dedalik/ts-anti-patterns / workflow publish.yml. Remove CRAP_TOKEN if set.
# npm Classic tokens are gone; granular tokens often require OTP (EOTP) in CI unless bypass is enabled.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish ts-anti-patterns to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Ensure npm supports OIDC trusted publishing
        run: npm install -g npm@11

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Verify tag matches package.json
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          PKG=$(node -p "require('./package.json').version")
          if [ "$VERSION" != "$PKG" ]; then
            echo "::error::Tag v$VERSION does not match package.json version $PKG"
            exit 1
          fi
          echo "Publishing version $PKG (tag $TAG)"

      # No CRAP_TOKEN: uses npm Trusted Publishing (OIDC) when configured on the package.
      # If you still use a granular token, set CRAP_TOKEN and uncomment NODE_AUTH_TOKEN below.
      - name: Publish to npm
        run: npm publish --provenance --access public
        # env:
        #   NODE_AUTH_TOKEN: ${{ secrets.CRAP_TOKEN }}
