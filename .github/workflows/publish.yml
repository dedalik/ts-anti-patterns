name: Publish to npm

# Publishes when you push a version tag (e.g. v1.0.0). Tag must match package.json.
# One-time setup: add CRAP_TOKEN (npm Automation token) at
#   https://github.com/dedalik/ts-crap/settings/secrets/actions
# Optional: enable npm trusted publishing for this repo (OIDC) on npmjs.com.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish ts-crap to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Verify tag matches package.json
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          PKG=$(node -p "require('./package.json').version")
          if [ "$VERSION" != "$PKG" ]; then
            echo "::error::Tag v$VERSION does not match package.json version $PKG"
            exit 1
          fi
          echo "Publishing version $PKG (tag $TAG)"

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.CRAP_TOKEN }}
